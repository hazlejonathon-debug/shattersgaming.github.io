<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Shatter's Gaming | Admin Login
</title>


<link rel="stylesheet" href="login.css">


<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;800;900&display=swap" rel="stylesheet">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


</head>


<body>


<!-- ===============================
     ANIMATED BACKGROUND
================================ -->


<div class="background-grid"></div>


<div class="particles">

    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>

</div>



<!-- ===============================
     LOGIN WRAPPER
================================ -->


<div class="login-wrapper">


<!-- ===============================
     LOGIN CARD
================================ -->


<div class="login-card">


<!-- LOGO AREA -->


<div class="brand">


<div class="logo-glow">

🎮

</div>


<h1>
SHATTER'S GAMING
</h1>


<h2>
ADMIN CONTROL CENTER
</h2>


<p>
Secure Firebase Authentication Portal
</p>


</div>

<!-- ===============================
     SECURITY STATUS
================================ -->

<div class="security-panel">


<div class="security-item">

<span class="status-dot"></span>

Firebase Connected

</div>


<div class="security-item">

<i class="fa-solid fa-lock"></i>

SSL Protected

</div>


<div class="security-item">

<i class="fa-solid fa-user-shield"></i>

Admin Access Only

</div>


</div>



<!-- ===============================
     LOGIN FORM
================================ -->


<div class="login-form">



<div class="input-group">


<i class="fa-solid fa-envelope"></i>


<input

type="email"

id="email"

placeholder="Admin Email"

autocomplete="email"

>


</div>




<div class="input-group">


<i class="fa-solid fa-lock"></i>


<input

type="password"

id="password"

placeholder="Password"

autocomplete="current-password"

>


<button id="show-password" type="button">

<i class="fa-solid fa-eye"></i>

</button>


</div>





<div class="login-options">


<label>


<input

type="checkbox"

id="remember-me"

>


Remember Me


</label>



<a href="#" id="forgot-password">

Forgot Password?

</a>



</div>





<button id="login-btn">


<span class="button-text">

LOGIN

</span>


<span class="button-loader">


<i class="fa-solid fa-circle-notch"></i>


Authenticating...


</span>



</button>




<div id="login-message"></div>



</div>
<!-- ===============================
     ACCESS STATUS
================================ -->

<div class="access-status" id="access-status">


<i class="fa-solid fa-shield-halved"></i>


<span>
Waiting for authentication...
</span>


</div>



<!-- ===============================
     FOOTER
================================ -->


<div class="login-footer">


<p>
© Shatter's Gaming
</p>


<p>

<i class="fa-solid fa-server"></i>

Secure Admin Portal

</p>


</div>



</div>


</div>



<!-- ===============================
     LOGIN SUCCESS OVERLAY
================================ -->


<div class="success-overlay" id="success-overlay">


<div class="success-box">


<i class="fa-solid fa-circle-check"></i>


<h2>
ACCESS GRANTED
</h2>


<p>
Redirecting to Admin Dashboard...
</p>


</div>


</div>



<script type="module" src="login.js"></script>


</body>

</html>
