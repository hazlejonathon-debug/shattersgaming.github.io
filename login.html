<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Shatter's Gaming Admin Login</title>

<link rel="stylesheet" href="login.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="login-container">

    <h1>
        🎮 Shatter's Gaming
    </h1>

    <h2>
        Admin Login
    </h2>

    <p>
        Sign in to access the order dashboard.
    </p>

    <input
        type="email"
        id="email"
        placeholder="Email">

    <input
        type="password"
        id="password"
        placeholder="Password">

    <button id="login-btn">

        Login

    </button>

    <p id="login-error"></p>

</div>

<script type="module" src="login.js"></script>

</body>

</html>
