<!DOCTYPE html>
<html lang="en">

<head>

<title>
Shatter's Gaming Admin Dashboard
</title>


<link rel="stylesheet" href="admin.css">


<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">


</head>


<body>


<header class="admin-header">
    


<div class="logo">
SHATTER'S GAMING ADMIN
</div>


<a href="store.html">
🛒 Back To Store
</a>

<button id="logout-btn">

🔒 Logout

</button>
</header>


<section class="dashboard">

<h1>
🔥 Order Dashboard
</h1>

<p>
Manage Shatter's Gaming orders and fulfillment.
</p>


<!-- Dashboard Stats -->

<div class="dashboard-stats">

    <div class="stat-card">

        <h3>Total Orders</h3>

        <span id="total-orders">0</span>

    </div>

    <div class="stat-card">

        <h3>Total Revenue</h3>

        <span id="total-revenue">$0.00</span>

    </div>

    <div class="stat-card">

        <h3>Pending Orders</h3>

        <span id="pending-orders">0</span>

    </div>

    <div class="stat-card">

        <h3>Completed Orders</h3>

        <span id="completed-orders">0</span>

    </div>

</div>


<div class="admin-search">

    <input
    type="text"
    id="order-search"
    placeholder="🔍 Search orders..."
    >

</div>


<div id="orders">

Loading orders...

</div>

</section>


<script type="module" src="admin.js"></script>


</body>

</html>
